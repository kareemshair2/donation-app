<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>تسجيل التبرعات</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <img src="logo.jpg" alt="Logo" class="app-logo">
    <div class="app-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1>تسجيل التبرعات</h1>
    <p class="header-sub">محافظة المنوفية</p>
  </header>

  <form id="donationForm" class="donation-form" novalidate>

    <div class="form-group">
      <label for="date">التاريخ</label>
      <input type="date" id="date" required>
    </div>

    <div class="form-group">
      <label for="center">المركز</label>
      <select id="center" required>
        <option value="">اختر المركز</option>
      </select>
      <div class="loader" id="centerLoader"></div>
    </div>

    <!-- ====== التبرعات ====== -->
    <div class="entries-section">
      <div class="entries-header">
        <span class="entries-title">التبرعات</span>
        <button type="button" class="btn-add-entry" id="addEntryBtn">+ إضافة تبرع</button>
      </div>

      <!-- صورة الإيصال (مرة واحدة) -->
      <div class="receipt-block">
        <label class="receipt-label">صورة الإيصال *</label>
        <div class="image-upload required" id="imageUploadBox">
          <input type="file" id="receiptImage" accept="image/*" capture="environment" required>
          <div class="upload-placeholder">
            <span class="upload-icon">
              <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
            </span>
            <span>اضغط لتصوير الإيصال</span>
          </div>
          <div class="upload-preview" id="uploadPreview" style="display:none;">
            <img id="previewImg" alt="معاينة">
            <button type="button" class="remove-image" id="removeImage">✕</button>
          </div>
        </div>
      </div>

      <div id="entriesContainer"></div>
    </div>

    <div class="error-message" id="errorMessage" style="display:none;"></div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <span class="btn-text">تسجيل الكل</span>
        <span class="btn-loader" style="display:none;">جاري الحفظ...</span>
      </button>
    </div>

  </form>

  <div class="success-overlay" id="successOverlay" style="display:none;">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2>تم التسجيل بنجاح!</h2>
      <p id="successMessage">تم حفظ جميع التبرعات</p>
      <button class="btn-new" id="newSubmission">تسجيل جديد</button>
    </div>
  </div>
</div>

<div class="sticky-bar">
  <button type="submit" class="btn-submit" id="stickySubmitBtn">
    <span class="btn-text">تسجيل الكل</span>
    <span class="btn-loader" style="display:none;">جاري الحفظ...</span>
  </button>
</div>

<script src="app.js"></script>
<script>
  document.getElementById('stickySubmitBtn').addEventListener('click', function() {
    document.getElementById('donationForm').requestSubmit();
  });
</script>
</body>
</html>
