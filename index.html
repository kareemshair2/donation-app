<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1565C0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>تسجيل التبرعات</title>
  <link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="app-container">

  <header class="app-header">
    <img src="logo.jpg" alt="Logo" class="app-logo">
    <div class="app-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
      </svg>
    </div>
    <h1>تسجيل التبرعات</h1>
    <p class="header-sub">محافظة المنوفية</p>
    <div class="brand-badge">
      <span class="brand-dot">◆</span>
      <span class="brand-text-top">OP_IT_MLM</span>
      <span class="brand-dot">◆</span>
    </div>
  </header>

  <form id="donationForm" class="donation-form" novalidate>

    <div class="form-group">
      <label for="date">التاريخ</label>
      <input type="date" id="date" required>
    </div>

    <div class="form-group">
      <label for="center">المركز</label>
      <select id="center" required>
        <option value="">اختر المركز</option>
      </select>
      <div class="loader" id="centerLoader"></div>
    </div>

    <!-- ====== التبرعات ====== -->
    <div class="entries-section">
      <div class="entries-header">
        <span class="entries-title">التبرعات</span>
        <button type="button" class="btn-add-entry" id="addEntryBtn">+ إضافة تبرع</button>
      </div>
      <div id="entriesContainer"></div>
    </div>

    <div class="error-message" id="errorMessage" style="display:none;"></div>

    <div class="form-actions">
      <button type="submit" class="btn-submit">
        <span class="btn-text">تسجيل الكل</span>
        <span class="btn-loader" style="display:none;">جاري الحفظ...</span>
      </button>
    </div>

  </form>

  <div class="success-overlay" id="successOverlay" style="display:none;">
    <div class="success-card">
      <div class="success-icon">✓</div>
      <h2>تم التسجيل بنجاح!</h2>
      <p id="successMessage">تم حفظ جميع التبرعات</p>
      <button class="btn-new" id="newSubmission">تسجيل جديد</button>
    </div>
  </div>

  <!-- Footer Branding -->
  <footer class="app-footer">
    <div class="footer-frame">
      <div class="footer-line"></div>
      <div class="footer-brand">
        <svg class="footer-star" width="16" height="16" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
        <span class="footer-name">كريم شعير</span>
        <span class="footer-divider">|</span>
        <span class="footer-tag">OP_IT_MLM</span>
        <svg class="footer-star" width="16" height="16" viewBox="0 0 24 24" fill="var(--orange)"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>
      </div>
      <div class="footer-subtitle">إدارة البيانات • التحول الرقمي</div>
      <div class="footer-line"></div>
    </div>
  </footer>
</div>

<div class="sticky-bar">
  <button type="submit" class="btn-submit" id="stickySubmitBtn">
    <span class="btn-text">تسجيل الكل</span>
    <span class="btn-loader" style="display:none;">جاري الحفظ...</span>
  </button>
</div>

<script src="app.js"></script>
<script>
  document.getElementById('stickySubmitBtn').addEventListener('click', function() {
    document.getElementById('donationForm').requestSubmit();
  });
</script>
</body>
</html>
